name: Triggering Workflow with Various Inputs
on:
    workflow_dispatch:
        inputs:
            run-tests:
                description: "Run tests?"
                type: boolean
                required: true
            test-type:
                description: "Type of test to run"
                type: choice
                options:
                    - unit
                    - integration
                    - all
                required: true    
            environment:
                description: "choose an environment"
                required: true
                type: environment
            build-number:
                description: "custom build number"
                type: number
                required: false
            message:
                description: "additional message"
                type: string
                required: false


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
        # Get input from workflow_dispatch
        - name: Print Workflow Inputs
          run: |
            echo "Run tests: ${{inputs.run-tests }}"
            echo "Test type: ${{ inputs.test-type }}"
            echo "Environment: ${{ inputs.environment }}"
            echo "Build number: ${{ inputs.build-number }}"
            echo "Message: ${{ inputs.message }}"
        # Perform actions based on inputs
        - name: Run tests (if selected)
          if: ${{ inputs.run-tests == 'true' }}
          run: echo "Testing................"
            


      
